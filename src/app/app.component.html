<header class="app-header" #header>
  <a routerLink="/" class="brand" aria-label="Pulseirinhas">
    <img src="/shared-assets/logo-micangas.png" alt="" />
  </a>
  <button
    type="button"
    class="menu-toggle"
    aria-label="Abrir menu"
    [attr.aria-expanded]="isMenuOpen"
    (click)="toggleMenu()"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>
  <nav class="nav" [class.open]="isMenuOpen">
    <a
      routerLink="/"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="closeMenu()"
    >
      Catalogo
    </a>
    <a routerLink="/cart" routerLinkActive="active" (click)="closeMenu()">Carrinho</a>
    <a routerLink="/checkout" routerLinkActive="active" (click)="closeMenu()">Finalizar Pedido</a>
  </nav>
</header>

<main class="app-main">
  <router-outlet />
</main>

<footer class="app-footer">
  <div class="footer-content">
    <div>
      <p>Pulseirinhas para todos os estilos</p>
    </div>
  </div>
  <p class="footer-copy">&copy; 2026 MicangasDaLore</p>
</footer>

<button
  type="button"
  class="scroll-top"
  [class.show]="showScrollTop"
  aria-label="Voltar ao topo"
  (click)="scrollToTop()"
>
  <span class="bead"></span>
  <span class="arrow">↑</span>
</button>
